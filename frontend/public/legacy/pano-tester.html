<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>파노라마 테스터 — 광화문 방</title>
<style>
  :root { --pa:rgba(16,20,18,.82); --line:rgba(255,255,255,.14); }
  * { box-sizing:border-box; }
  html,body { margin:0; height:100%; overflow:hidden; background:#0b0f0d; font-family:"Pretendard",system-ui,sans-serif; color:#eef; }
  #c { position:fixed; inset:0; display:block; }
  .panel { position:fixed; background:var(--pa); border:1px solid var(--line); border-radius:14px;
           backdrop-filter:blur(8px); padding:14px 16px; }
  #ui { top:14px; left:14px; width:308px; }
  #ui h1 { font-size:15px; margin:0 0 2px; letter-spacing:.3px; }
  #ui .sub { font-size:11.5px; opacity:.7; line-height:1.5; margin:0 0 10px; }
  .row { display:flex; align-items:center; gap:8px; margin:9px 0; font-size:12.5px; }
  .row label { flex:0 0 84px; opacity:.85; }
  input[type=range]{ flex:1; accent-color:#9fd; }
  .btn { display:inline-flex; align-items:center; gap:6px; cursor:pointer; border:1px solid var(--line);
         background:rgba(255,255,255,.06); color:#eef; border-radius:9px; padding:8px 12px; font-size:12.5px; }
  .btn:hover { background:rgba(255,255,255,.12); }
  .btn.primary { background:#2b6; border-color:#2b6; color:#04130a; font-weight:700; }
  #val { font-variant-numeric:tabular-nums; opacity:.9; min-width:42px; text-align:right; }
  #meta { margin-top:10px; font-size:11.5px; line-height:1.55; opacity:.8; border-top:1px solid var(--line); padding-top:9px; }
  #meta b { color:#9fd; }
  .warn { color:#fd8; }
  #drop { position:fixed; inset:0; display:none; align-items:center; justify-content:center;
          background:rgba(6,10,8,.78); z-index:9; font-size:20px; border:3px dashed rgba(255,255,255,.4); }
  #hint { position:fixed; bottom:14px; left:50%; transform:translateX(-50%); font-size:12px; opacity:.6; }
  .seg { display:flex; gap:6px; flex-wrap:wrap; margin:8px 0 2px; }
  .seg .btn { padding:6px 10px; font-size:11.5px; }
  .on { outline:2px solid #9fd; }
</style>
</head>
<body>
<canvas id="c"></canvas>

<div class="panel" id="ui">
  <h1>🌀 파노라마 테스터</h1>
  <p class="sub">AI로 뽑은 <b>등거리(2:1) 360 파노라마</b>를 화면에 끌어다 놓으면 즉시 구에 감깁니다. “땅에 닿는지 · 광화문에 있는 방 느낌인지”를 바로 확인하세요.</p>

  <label class="btn primary" style="width:100%; justify-content:center;">
    📂 이미지 열기<input id="file" type="file" accept="image/*" hidden />
  </label>

  <div class="row"><label>게이트 정렬</label>
    <input id="rot" type="range" min="-180" max="180" step="1" value="0" />
    <span id="val">0°</span>
  </div>
  <div class="row"><label>지평선 높이</label>
    <input id="eye" type="range" min="0.6" max="2.4" step="0.05" value="1.5" />
    <span id="eyev">1.5m</span>
  </div>

  <div class="seg">
    <button class="btn on" id="bFurn">🪑 가구</button>
    <button class="btn on" id="bFloor">▦ 바닥</button>
    <button class="btn on" id="bRoom">⬜ 벽</button>
    <button class="btn" id="bSpin">↻ 자동회전</button>
  </div>

  <div id="meta">이미지를 끌어다 놓거나 <b>이미지 열기</b>를 누르세요.<br>
  드래그=둘러보기 · 휠 제한(방 안 고정).</div>
</div>

<div id="drop">📥 여기에 360 파노라마를 놓으세요</div>
<div id="hint">드래그로 둘러보기 · 게이트가 정면 안 오면 “게이트 정렬” 슬라이더로 맞추기</div>

<script type="importmap">
{ "imports": {
  "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
  "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
}}
</script>
<script type="module">
import * as THREE from "three";
import { OrbitControls } from "three/addons/controls/OrbitControls.js";

const cvs = document.getElementById("c");
const renderer = new THREE.WebGLRenderer({ canvas: cvs, antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio || 1, 1.5));
renderer.setSize(innerWidth, innerHeight);
renderer.outputColorSpace = THREE.SRGBColorSpace;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x9fb6d4);
let EYE = 1.5;
const camera = new THREE.PerspectiveCamera(62, innerWidth / innerHeight, 0.02, 500);
camera.position.set(0, EYE, 2.2);

const controls = new OrbitControls(camera, cvs);
controls.enableDamping = true; controls.dampingFactor = 0.09; controls.rotateSpeed = 0.55;
controls.enablePan = false; controls.enableZoom = false;
controls.minPolarAngle = THREE.MathUtils.degToRad(50);
controls.maxPolarAngle = THREE.MathUtils.degToRad(135);
controls.target.set(0, EYE - 0.18, 0);

// 빛
scene.add(new THREE.HemisphereLight(0xcfe0ff, 0x445, 0.8));
const sun = new THREE.DirectionalLight(0xfff4e6, 1.4); sun.position.set(-4, 8, -3); scene.add(sun);

// ── 파노라마 구 (BackSide + scale.x=-1) ──
const SKY_R = 100;
const skyMat = new THREE.MeshBasicMaterial({ side: THREE.BackSide, depthWrite: false, fog: false, toneMapped: false });
const sky = new THREE.Mesh(new THREE.SphereGeometry(SKY_R, 64, 40), skyMat);
sky.scale.x = -1; sky.renderOrder = -2; sky.frustumCulled = false; sky.visible = false;
scene.add(sky);
let gateDeg = 0;
function orient(){ sky.rotation.y = THREE.MathUtils.degToRad(gateDeg); }   // 게이트(이미지 중심)를 정면(-Z)에 맞추는 슬라이더

const maxAniso = renderer.capabilities.getMaxAnisotropy?.() || 8;
function loadPano(url){
  new THREE.TextureLoader().load(url, t => {
    t.colorSpace = THREE.SRGBColorSpace; t.anisotropy = maxAniso;
    if (skyMat.map) skyMat.map.dispose();
    skyMat.map = t; skyMat.needsUpdate = true; sky.visible = true;
    const w = t.image.width, h = t.image.height, ratio = (w / h).toFixed(2);
    const ok = Math.abs(w / h - 2) < 0.06;
    document.getElementById("meta").innerHTML =
      `해상도 <b>${w}×${h}</b> · 비율 <b>${ratio}:1</b> ` +
      (ok ? `✓ 등거리(2:1) 적합` : `<span class="warn">⚠ 2:1이 아니면 구에 왜곡됩니다</span>`) +
      `<br>게이트가 정면에 안 오면 “게이트 정렬”로 회전.`;
  }, undefined, () => { document.getElementById("meta").innerHTML = `<span class="warn">이미지를 읽지 못했습니다.</span>`; });
}

// ── 바닥 + 방 벽 + 가구 프록시(“땅에 닿는지 · 방 느낌인지” 판단용) ──
function gridTex(){
  const c = document.createElement("canvas"); c.width = c.height = 512; const x = c.getContext("2d");
  x.fillStyle = "#c9bfa8"; x.fillRect(0,0,512,512);
  x.strokeStyle = "rgba(0,0,0,.10)"; x.lineWidth = 2;
  for (let i=0;i<=512;i+=64){ x.beginPath(); x.moveTo(i,0); x.lineTo(i,512); x.moveTo(0,i); x.lineTo(512,i); x.stroke(); }
  const t = new THREE.CanvasTexture(c); t.colorSpace = THREE.SRGBColorSpace;
  t.wrapS=t.wrapT=THREE.RepeatWrapping; t.repeat.set(8,8); return t;
}
const floor = new THREE.Mesh(new THREE.PlaneGeometry(40,40),
  new THREE.MeshStandardMaterial({ map: gridTex(), roughness:.9 }));
floor.rotation.x = -Math.PI/2; floor.position.y = 0; scene.add(floor);

// 방 벽(낮은 미니멀 벽 — “방”의 포위 단서)
const room = new THREE.Group();
const wallMat = new THREE.MeshStandardMaterial({ color:0xf2efe9, roughness:1, side:THREE.DoubleSide });
const RW=7, RD=6, RH=2.6;
function wall(w,h,x,y,z,ry){ const m=new THREE.Mesh(new THREE.BoxGeometry(w,h,0.08), wallMat); m.position.set(x,y,z); m.rotation.y=ry; room.add(m); }
wall(RW,RH, 0,RH/2,-RD/2,0);          // 정면(뒤)
wall(RW,0.9, 0,0.45, RD/2,0);          // 앞(낮은 난간만 — 트여서 파노라마 보임)
wall(RD,RH, -RW/2,RH/2,0,Math.PI/2);   // 좌
wall(RD,RH,  RW/2,RH/2,0,Math.PI/2);   // 우
scene.add(room);

// 가구 프록시: 테이블 + 의자 + 러그
const furn = new THREE.Group();
const wood = new THREE.MeshStandardMaterial({ color:0xc9a876, roughness:.6 });
const fab  = new THREE.MeshStandardMaterial({ color:0xd9cdc4, roughness:.9 });
const rug = new THREE.Mesh(new THREE.CircleGeometry(2.4,40), new THREE.MeshStandardMaterial({color:0xece7df,roughness:1}));
rug.rotation.x=-Math.PI/2; rug.position.y=0.01; furn.add(rug);
const top = new THREE.Mesh(new THREE.CylinderGeometry(1.1,1.1,0.08,32), wood); top.position.y=0.74; furn.add(top);
const leg = new THREE.Mesh(new THREE.CylinderGeometry(0.18,0.26,0.74,16), wood); leg.position.y=0.37; furn.add(leg);
for (let i=0;i<6;i++){ const a=i/6*Math.PI*2, r=1.7;
  const ch=new THREE.Mesh(new THREE.BoxGeometry(0.5,0.5,0.5), fab); ch.position.set(Math.cos(a)*r,0.45,Math.sin(a)*r); furn.add(ch);
  const bk=new THREE.Mesh(new THREE.BoxGeometry(0.5,0.5,0.08), fab); bk.position.set(Math.cos(a)*(r+0.22),0.78,Math.sin(a)*(r+0.22)); bk.lookAt(0,0.78,0); furn.add(bk); }
furn.traverse(m=>{ if(m.isMesh){ m.castShadow=true; m.receiveShadow=true; } });
scene.add(furn);

// ── 토글 ──
const T = (id, obj) => { const b=document.getElementById(id); b.onclick=()=>{ obj.visible=!obj.visible; b.classList.toggle("on", obj.visible); }; };
T("bFurn", furn); T("bFloor", floor); T("bRoom", room);
let spin=false; const bs=document.getElementById("bSpin"); bs.onclick=()=>{ spin=!spin; bs.classList.toggle("on",spin); };

// 슬라이더
const rot=document.getElementById("rot"), val=document.getElementById("val");
rot.oninput=()=>{ gateDeg=+rot.value; val.textContent=gateDeg+"°"; orient(); };
const eye=document.getElementById("eye"), eyev=document.getElementById("eyev");
eye.oninput=()=>{ EYE=+eye.value; eyev.textContent=EYE.toFixed(2)+"m";
  camera.position.y=EYE; controls.target.y=EYE-0.18; };

// 파일 입력 + 드래그앤드롭
document.getElementById("file").onchange = e => { const f=e.target.files[0]; if(f) loadPano(URL.createObjectURL(f)); };
const drop=document.getElementById("drop");
addEventListener("dragover", e=>{ e.preventDefault(); drop.style.display="flex"; });
drop.addEventListener("dragleave", ()=> drop.style.display="none");
addEventListener("drop", e=>{ e.preventDefault(); drop.style.display="none";
  const f=[...e.dataTransfer.files].find(f=>f.type.startsWith("image/")); if(f) loadPano(URL.createObjectURL(f)); });

// 루프
function tick(){
  if(spin){ controls.autoRotate=false; camera.position.applyAxisAngle(new THREE.Vector3(0,1,0), 0.0025);
            controls.target.y=EYE-0.18; }
  controls.update();
  sky.position.copy(camera.position);   // 파노라마는 카메라 추적(무한히 먼 배경)
  // 카메라가 방 밖으로 못 나가게(방 안 느낌)
  const m=0.4;
  camera.position.x=Math.min(Math.max(camera.position.x,-RW/2+m),RW/2-m);
  camera.position.z=Math.min(Math.max(camera.position.z,-RD/2+m),RD/2-m);
  camera.position.y=Math.min(Math.max(camera.position.y,0.4),RH-0.15);
  renderer.render(scene,camera);
  requestAnimationFrame(tick);
}
tick();
addEventListener("resize", ()=>{ camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix(); renderer.setSize(innerWidth,innerHeight); });
</script>
</body>
</html>
